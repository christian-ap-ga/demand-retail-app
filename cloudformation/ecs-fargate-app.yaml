AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploys a Streamlit application on ECS Fargate with an Application Load Balancer.
  Creates all required resources in a single stack: IAM roles, ECS cluster,
  task definition, service, ALB, and security groups. HTTP on port 80.

  Deploy with:
    aws cloudformation deploy \
      --template-file ecs-fargate-app.yaml \
      --stack-name house-predictions-app \
      --capabilities CAPABILITY_NAMED_IAM \
      --parameter-overrides \
          VpcId=vpc-xxxxxxxx \
          SubnetIds="subnet-aaa,subnet-bbb,subnet-ccc" \
          ImageUri=123456789012.dkr.ecr.us-east-1.amazonaws.com/house-predictions:latest \
      --region us-east-1

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the application will be deployed.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the ALB and ECS tasks.
      Minimum 2 subnets in different AZs.

  ImageUri:
    Type: String
    Description: >
      Full ECR image URI.
      Example: 123456789012.dkr.ecr.us-east-1.amazonaws.com/house-predictions:latest

  ServiceName:
    Type: String
    Default: house-pred
    MaxLength: 20
    Description: >
      Service name (max 20 characters). Used as a prefix for all resources:
      ECS, ALB (max 32), Target Group (max 32), IAM roles.

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of Fargate tasks to keep running.

  Cpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: CPU units for the Fargate task (256 = 0.25 vCPU).

  Memory:
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048', '4096', '8192']
    Description: Memory in MiB for the Fargate task.

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: CloudWatch log retention in days.

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ---------------------------------------------------------------------------
  # 1. IAM Roles
  # ---------------------------------------------------------------------------

  # Allows ECS Fargate to pull images from ECR and write logs to CloudWatch.
  # This is an infrastructure role — used by ECS, not by the app code.
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - ssm:GetParameters
                  - kms:Decrypt
                Resource: '*'

  # Permissions for the app code running inside the container:
  # S3 for data, SageMaker for inference, Bedrock for LLMs.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StreamlitDataSciencePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: '*'
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                  - sagemaker:InvokeEndpointAsync
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  # ---------------------------------------------------------------------------
  # 2. ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ServiceName}-cluster'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: app
          Value: !Ref ServiceName

  # ---------------------------------------------------------------------------
  # 3. CloudWatch Log Group
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ServiceName}'
      RetentionInDays: !Ref LogRetentionDays

  # ---------------------------------------------------------------------------
  # 4. Security Groups
  #    - ALBSecurityGroup: allows HTTP (80) from the internet
  #    - ECSSecurityGroup: allows traffic from the ALB on port 8501
  # ---------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB HTTP access for ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP from internet
      Tags:
        - Key: app
          Value: !Ref ServiceName

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ECS tasks access from ALB for ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Traffic from ALB to Streamlit port
      Tags:
        - Key: app
          Value: !Ref ServiceName

  # ---------------------------------------------------------------------------
  # 5. Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ServiceName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: app
          Value: !Ref ServiceName

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ServiceName}-tg'
      Protocol: HTTP
      Port: 8501
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: app
          Value: !Ref ServiceName

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------------------
  # 6. Task Definition
  # ---------------------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ServiceName
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8501/_stcore/health || exit 1
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60

  # ---------------------------------------------------------------------------
  # 7. ECS Service
  #    DependsOn: Listener — prevents ECS from registering tasks before the
  #    ALB is ready to receive health checks.
  # ---------------------------------------------------------------------------
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Ref ServiceName
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8501
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 120
      Tags:
        - Key: app
          Value: !Ref ServiceName

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  AppURL:
    Description: Public URL of the Streamlit application
    Value: !Sub 'http://${ALB.DNSName}'

  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ALB.DNSName

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  LogGroupName:
    Description: CloudWatch log group name
    Value: !Ref LogGroup
